name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Backend integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: beeforest
          POSTGRES_PASSWORD: beeforest
          POSTGRES_DB: beeforest_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Points vitest.config.ts to the CI service container
      TEST_DATABASE_URL: postgresql://beeforest:beeforest@localhost:5432/beeforest_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        working-directory: packages/backend

      - name: Run tests
        run: npm test
        working-directory: packages/backend
