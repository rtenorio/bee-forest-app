name: PostgreSQL Backup to Cloudflare R2

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 00:00 Brasília (BRT, UTC-3)
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    name: Backup & Upload to R2
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Set backup filename
        id: filename
        run: |
          FILENAME="backup-$(date -u +%Y-%m-%d).sql.gz"
          echo "FILENAME=$FILENAME" >> $GITHUB_OUTPUT

      - name: Run pg_dump and compress
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pg_dump "$DATABASE_URL" | gzip > "${{ steps.filename.outputs.FILENAME }}"
          echo "Backup criado: ${{ steps.filename.outputs.FILENAME }} ($(du -sh ${{ steps.filename.outputs.FILENAME }} | cut -f1))"

      - name: Configure AWS CLI for Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto

      - name: Upload backup to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_BACKUP: ${{ secrets.R2_BUCKET_BACKUP }}
        run: |
          aws s3 cp "${{ steps.filename.outputs.FILENAME }}" \
            "s3://${R2_BUCKET_BACKUP}/${{ steps.filename.outputs.FILENAME }}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          echo "Upload concluído: s3://${R2_BUCKET_BACKUP}/${{ steps.filename.outputs.FILENAME }}"

      - name: Delete backups older than 30 days
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_BACKUP: ${{ secrets.R2_BUCKET_BACKUP }}
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          CUTOFF=$(date -u -d "30 days ago" +%Y-%m-%d)

          echo "Removendo backups anteriores a $CUTOFF..."

          aws s3 ls "s3://${R2_BUCKET_BACKUP}/" \
            --endpoint-url "$ENDPOINT" | \
          awk '{print $4}' | \
          grep -E '^backup-[0-9]{4}-[0-9]{2}-[0-9]{2}\.sql\.gz$' | \
          while read -r FILE; do
            FILE_DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
            if [[ "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Deletando: $FILE"
              aws s3 rm "s3://${R2_BUCKET_BACKUP}/$FILE" \
                --endpoint-url "$ENDPOINT"
            fi
          done

          echo "Limpeza concluída."

      - name: Cleanup local backup file
        if: always()
        run: rm -f "${{ steps.filename.outputs.FILENAME }}"
